# Continuous Acquisition Configurations
[client]
timeout = 60

[logger]
level = "INFO"
format = "%(asctime)s %(name)s %(levelname)s : %(message)s"
file = "ztest_con_acq.log"
max_bytes = 100_000_000
backup_count = 2

[dss]
file = "novastar.dss"

[period]
start = "now_minus_1Day"
end = "now"

