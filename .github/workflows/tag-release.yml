name: Create Release and Upload Tarball

on:
  push:
    branches:
      - 'release/**'
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          TAG="${BRANCH_NAME#release/}"
          VERSIONING="${TAG#v}"
          ARCHIVE_NAME="${GITHUB_REPOSITORY##*/}-${VERSIONING}.tar.gz"

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSIONING=$VERSIONING" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Create source tarball
        shell: bash
        run: |
          mkdir -p out
          git archive --format=tar --prefix="${VERSIONING}/" HEAD | gzip > "out/${ARCHIVE_NAME}"
          ls -l out

      - name: Compute SHA256
        id: sha
        shell: bash
        run: |
          FILE="out/${{ env.ARCHIVE_NAME }}"
          SHA256="$(sha256sum "$FILE" | awk '{print $1}')"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          FILE="${{ env.ARCHIVE_NAME }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          cat > release-notes.md <<EOF
          ### Windows install

          Verify the download before installing.

          **PowerShell**
          \`\`\`powershell
          Get-FileHash ".\\$FILE" -Algorithm SHA256
          \`\`\`

          **CMD**
          \`\`\`cmd
          certutil -hashfile "$FILE" SHA256
          \`\`\`

          Expected SHA256:
          \`$SHA256\`

          Install:
          \`\`\`powershell
          pip install .\\$FILE
          \`\`\`
          EOF

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ github.ref_name }}
          name: ${{ env.TAG }}
          body_path: release-notes.md
          generate_release_notes: true
          files: out/${{ env.ARCHIVE_NAME }}
          overwrite_files: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
