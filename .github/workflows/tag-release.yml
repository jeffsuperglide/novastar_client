name: Tag Release and Upload Tarball

on:
  push:
    tags:
      - 'v*.*.*' # adjust pattern as needed
    paths-ignore:
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set tag variables
        id: vars
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSIONING=${TAG#v}
          ARCHIVE_NAME="${GITHUB_REPOSITORY##*/}-${VERSIONING}.tar.gz"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSIONING=$VERSIONING" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Create source tarball
        run: |
          mkdir -p out
          git archive --format=tar --prefix="${VERSIONING}/" "${TAG}" | gzip > "out/${ARCHIVE_NAME}"
          ls -l out

      - name: Compute SHA256
        id: sha
        shell: bash
        run: |
          FILE="out/${{ env.ARCHIVE_NAME }}"
          SHA256="$(sha256sum "$FILE" | awk '{print $1}')"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

     - name: Write release notes
        shell: bash
        run: |
          FILE="${{ steps.vars.outputs.archive_name }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          cat > release-notes.md <<EOF
          ### Windows install

          Verify the download before installing.

          **PowerShell**
          \`\`\`powershell
          Get-FileHash ".\\$FILE" -Algorithm SHA256
          \`\`\`

          **CMD**
          \`\`\`cmd
          certutil -hashfile "$FILE" SHA256
          \`\`\`

          Expected SHA256:
          \`$SHA256\`

          Install:
          \`\`\`powershell
          pip install .\\$FILE
          \`\`\`
          EOF

      - name: Create/Update release and upload tarball
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ env.TAG }} # defaults to github.ref_name but adding here
          name: ${{ env.TAG }} # release name
          body: Release ${{ env.TAG }}
          body_path: release-notes.md
          files: out/${{ env.ARCHIVE_NAME }}
          overwrite_files: true # replaced if it already exists
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
