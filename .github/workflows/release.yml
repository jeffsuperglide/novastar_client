name: Create release tarball

on:
  release:
    types: [ published ]

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git info
        run: |
          echo "TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "REPO=${{ github.repository }}" >> $GITHUB_ENV

      - name: Extract version and archive name
        id: vars
        run: |
          TAG="${TAG:-$GITHUB_REF_NAME}"
          # strip leading 'v' for file name if present
          PLAIN="${TAG#v}"
          ARCHIVE_NAME="${{ github.event.release.name || PLAIN }}-${PLAIN}.tar.gz"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "PLAIN_TAG=$PLAIN" >> $GITHUB_ENV

      - name: Create source tarball
        run: |
          mkdir -p out
          git archive --format=tar --prefix="${{ env.PLAIN_TAG }}/" "${{ github.ref_name }}" | gzip > out/${{ env.ARCHIVE_NAME }}
          ls -l out

      - name: Upload tarball as release asset
        uses: softprops/action-gh-release@v1
        with:
          files: out/${{ env.ARCHIVE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
